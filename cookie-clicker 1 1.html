<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCENTORA — Candle Clicker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --charcoal: #3F3F3F;
    --cream: #F5F5F5;
    --silver: #BFBFBF;
    --gold: #FFD07A;
    --black: #111111;
    --panel-bg: #1c1c1c;
    --panel-border: #2e2e2e;
    --text-dim: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    font-family: 'Raleway', sans-serif;
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.35;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--panel-border);
    position: relative;
    background: var(--black);
  }

  .logo-block { text-align: center; }

  .logo-word {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(1.8rem, 5vw, 3rem);
    letter-spacing: 0.35em;
    color: var(--cream);
    text-transform: uppercase;
    line-height: 1;
  }

  .logo-sub {
    font-family: 'Raleway', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    color: var(--silver);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .header-tagline {
    position: absolute;
    right: 40px;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .layout { display: flex; flex: 1; }

  /* LEFT */
  .stats-panel {
    width: 210px;
    min-width: 175px;
    background: var(--panel-bg);
    border-right: 1px solid var(--panel-border);
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .panel-section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--panel-border);
  }

  .cookie-count { text-align: center; margin-bottom: 20px; }

  .cookie-count .big {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(1.8rem, 3.5vw, 2.6rem);
    color: var(--gold);
    line-height: 1;
    letter-spacing: 0.05em;
  }

  .cookie-count .label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--silver);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.72rem;
    padding: 7px 10px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--panel-border);
  }

  .stat-row .s-label { color: var(--text-dim); letter-spacing: 0.05em; }
  .stat-row .s-val { color: var(--cream); font-weight: 500; }

  .milestones { margin-top: auto; padding-top: 20px; }

  .milestone-item {
    font-size: 0.68rem;
    color: var(--text-dim);
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.05em;
    transition: color 0.4s;
  }

  .milestone-item.reached { color: var(--gold); }

  .m-line {
    flex: 1;
    height: 1px;
    background: var(--panel-border);
    transition: background 0.4s;
  }
  .milestone-item.reached .m-line { background: var(--gold); opacity: 0.4; }

  /* CENTER */
  .center-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
    background: var(--black);
  }

  #bg-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .center-panel::before {
    content: '';
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,208,122,0.06) 0%, transparent 65%);
    pointer-events: none;
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    animation: breath 4s ease-in-out infinite;
    z-index: 1;
  }

  @keyframes breath {
    0%, 100% { transform: translate(-50%, -55%) scale(1); opacity: 0.7; }
    50% { transform: translate(-50%, -55%) scale(1.12); opacity: 1; }
  }

  #candle-btn {
    background: none;
    border: none;
    cursor: pointer;
    position: relative;
    z-index: 2;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    padding: 10px;
    transition: transform 0.1s ease;
  }

  #candle-btn:active { transform: scale(0.95); }

  .candle-svg {
    width: 140px;
    filter: drop-shadow(0 0 20px rgba(255,208,122,0.25)) drop-shadow(0 20px 40px rgba(0,0,0,0.8));
    transition: filter 0.2s;
  }

  #candle-btn:hover .candle-svg {
    filter: drop-shadow(0 0 35px rgba(255,208,122,0.5)) drop-shadow(0 20px 40px rgba(0,0,0,0.8));
  }

  #flame { transform-origin: 50% 100%; animation: flicker 1.8s ease-in-out infinite; }
  @keyframes flicker {
    0%, 100% { transform: scaleX(1) scaleY(1) rotate(0deg); }
    20% { transform: scaleX(0.9) scaleY(1.05) rotate(-2deg); }
    40% { transform: scaleX(1.05) scaleY(0.96) rotate(1.5deg); }
    60% { transform: scaleX(0.92) scaleY(1.04) rotate(-1deg); }
    80% { transform: scaleX(1.04) scaleY(0.98) rotate(2deg); }
  }

  .cps-display {
    margin-top: 28px;
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .cps-display em { font-style: normal; color: var(--gold); font-weight: 500; }

  .click-hint {
    margin-top: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--silver);
    opacity: 0.5;
    letter-spacing: 0.05em;
    position: relative;
    z-index: 2;
  }

  .float-text {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 2rem;
    color: var(--gold);
    pointer-events: none;
    z-index: 99;
    letter-spacing: 0.08em;
    text-shadow: 0 0 18px rgba(255,208,122,0.9), 0 0 40px rgba(255,160,32,0.5);
    animation: float-up 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
    white-space: nowrap;
  }

  .float-text.big {
    font-size: 2.8rem;
    text-shadow: 0 0 28px rgba(255,208,122,1), 0 0 60px rgba(255,120,0,0.7);
  }

  @keyframes float-up {
    0%   { opacity: 1; transform: translateY(0) scale(1.1); }
    15%  { opacity: 1; transform: translateY(-12px) scale(1.18); }
    100% { opacity: 0; transform: translateY(-90px) scale(0.75); }
  }

  /* Flash de lumière au clic */
  .click-flash {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 3;
    animation: flash-out 0.45s ease-out forwards;
  }

  @keyframes flash-out {
    0%   { opacity: 0.55; transform: scale(0.3); }
    60%  { opacity: 0.15; transform: scale(1.1); }
    100% { opacity: 0;    transform: scale(1.4); }
  }

  /* Ondulation (ripple) */
  .click-ripple {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(255,208,122,0.6);
    pointer-events: none;
    z-index: 3;
    animation: ripple-out 0.7s ease-out forwards;
  }

  @keyframes ripple-out {
    0%   { opacity: 0.8; transform: scale(0.2); }
    100% { opacity: 0;   transform: scale(2.2); }
  }

  /* RIGHT */
  .shop-panel {
    width: 360px;
    min-width: 300px;
    background: var(--panel-bg);
    border-left: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .shop-header {
    padding: 20px 20px 12px;
    border-bottom: 1px solid var(--panel-border);
    background: rgba(0,0,0,0.3);
  }

  .shop-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--panel-border) transparent;
  }

  .shop-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--panel-border);
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
  }

  .shop-item::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--gold);
    transform: scaleY(0);
    transition: transform 0.15s ease;
    transform-origin: bottom;
  }

  .shop-item:hover:not(.disabled)::after { transform: scaleY(1); }
  .shop-item:hover:not(.disabled) { background: rgba(255,208,122,0.04); border-color: #3a3a3a; }
  .shop-item.disabled { opacity: 0.35; cursor: not-allowed; }

  .shop-item .icon { font-size: 1.3rem; flex-shrink: 0; opacity: 0.85; }
  .shop-item .info { flex: 1; min-width: 0; }

  .shop-item .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.88rem;
    letter-spacing: 0.08em;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .shop-item .desc { font-size: 0.63rem; color: var(--text-dim); letter-spacing: 0.05em; margin-top: 1px; }
  .shop-item .right { text-align: right; flex-shrink: 0; }

  .shop-item .cost {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1.1;
  }

  .shop-item .owned { font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }

  .upgrades-section {
    border-top: 1px solid var(--panel-border);
    padding: 12px;
    max-height: 280px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--panel-border) transparent;
  }

  .upgrade-grid { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }

  .upgrade-btn {
    width: 100%;
    border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.02);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    text-align: left;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .upgrade-btn::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--gold);
    transform: scaleY(0);
    transition: transform 0.15s ease;
    transform-origin: bottom;
  }

  .upgrade-btn:hover:not(.disabled):not(.bought)::after { transform: scaleY(1); }
  .upgrade-btn:hover:not(.disabled):not(.bought) { background: rgba(255,208,122,0.05); border-color: #3a3a3a; }
  .upgrade-btn.disabled { opacity: 0.35; cursor: not-allowed; }
  .upgrade-btn.bought { background: rgba(255,208,122,0.04); border-color: rgba(255,208,122,0.2); cursor: default; opacity: 0.55; }

  .upgrade-btn .u-icon { font-size: 1.1rem; flex-shrink: 0; }

  .upgrade-btn .u-body { flex: 1; min-width: 0; }

  .upgrade-btn .u-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    letter-spacing: 0.07em;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .upgrade-btn.bought .u-name { color: var(--gold); }

  .upgrade-btn .u-desc {
    font-size: 0.62rem;
    color: var(--text-dim);
    letter-spacing: 0.03em;
    margin-top: 2px;
    line-height: 1.4;
    white-space: normal;
  }

  .upgrade-btn .u-cost {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    color: var(--gold);
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }

  .upgrade-btn.bought .u-cost { color: var(--silver); font-size: 0.7rem; }

  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--panel-bg);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    letter-spacing: 0.12em;
    padding: 10px 26px;
    z-index: 300;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 820px) { .stats-panel { display: none; } .header-tagline { display: none; } }
  @media (max-width: 600px) {
    .layout { flex-direction: column; }
    .shop-panel { width: 100%; border-left: none; border-top: 1px solid var(--panel-border); max-height: 340px; }
    .candle-svg { width: 110px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo-word">SCENTORA</div>
    <div class="logo-sub">La Neuveville</div>
  </div>
  <div class="header-tagline">Candle Clicker</div>
</header>

<div class="layout">

  <div class="stats-panel">
    <div class="panel-section-title">Statistiques</div>
    <div class="cookie-count">
      <div class="big" id="total-count">0</div>
      <div class="label">bougies allumées</div>
    </div>
    <div class="stat-row"><span class="s-label">Par clic</span><span class="s-val" id="stat-cpc">1</span></div>
    <div class="stat-row"><span class="s-label">Par seconde</span><span class="s-val" id="stat-cps">0</span></div>
    <div class="stat-row"><span class="s-label">Clics totaux</span><span class="s-val" id="stat-clicks">0</span></div>
    <div class="stat-row"><span class="s-label">Artisans</span><span class="s-val" id="stat-buildings">0</span></div>
    <div class="stat-row" id="wax-tier-row" style="margin-top:4px;border-color:#3a3a3a"><span class="s-label">Cire</span><span class="s-val" id="stat-wax-tier" style="color:#F5F5F5">Naturelle</span></div>
    <div class="stat-row" style="border-color:#2a2a2a;padding:6px 10px;flex-direction:column;align-items:flex-start;gap:4px">
      <span class="s-label" style="font-size:0.6rem">Prochain palier</span>
      <div style="width:100%;height:3px;background:#2e2e2e;border-radius:2px;overflow:hidden">
        <div id="wax-progress-bar" style="height:100%;width:0%;background:var(--gold);transition:width 0.3s ease;border-radius:2px"></div>
      </div>
      <span id="wax-progress-label" class="s-label" style="font-size:0.58rem;align-self:flex-end">250 pts</span>
    </div>
    <div class="milestones">
      <div class="panel-section-title" style="margin-bottom:10px">Jalons</div>
      <div id="milestones-list"></div>
    </div>
  </div>

  <div class="center-panel" id="center-panel">
    <canvas id="bg-canvas"></canvas>
    <button id="candle-btn" title="Allumer une bougie">
      <svg class="candle-svg" viewBox="0 0 140 260" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="waxGrad" cx="35%" cy="30%" r="70%">
            <stop id="wax-stop-0" offset="0%" stop-color="#F5F5F5"/>
            <stop id="wax-stop-1" offset="50%" stop-color="#D8D8D0"/>
            <stop id="wax-stop-2" offset="100%" stop-color="#B8B8A8"/>
          </radialGradient>
          <radialGradient id="waxTop" cx="50%" cy="50%" r="50%">
            <stop id="wax-top-0" offset="0%" stop-color="#EFEFEF"/>
            <stop id="wax-top-1" offset="100%" stop-color="#C8C8BC"/>
          </radialGradient>
          <radialGradient id="flameGrad" cx="50%" cy="30%" r="50%">
            <stop offset="0%" stop-color="#FFFFFF"/>
            <stop offset="30%" stop-color="#FFD07A"/>
            <stop offset="70%" stop-color="#FFA020"/>
            <stop offset="100%" stop-color="#FF6010" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFD07A" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#FFD07A" stop-opacity="0"/>
          </radialGradient>
          <filter id="flameSoft">
            <feGaussianBlur stdDeviation="1.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <ellipse cx="70" cy="38" rx="32" ry="28" fill="url(#glowGrad)"/>
        <g id="flame" filter="url(#flameSoft)">
          <path d="M70 12 C62 22, 56 32, 60 42 C63 50, 70 54, 77 50 C84 46, 86 36, 82 28 C78 20, 70 12, 70 12 Z" fill="url(#flameGrad)" opacity="0.9"/>
          <path d="M70 22 C67 28, 65 35, 67 40 C69 44, 72 45, 74 43 C77 40, 77 33, 74 27 Z" fill="#fff" opacity="0.7"/>
        </g>
        <line x1="70" y1="52" x2="70" y2="65" stroke="#3F3F3F" stroke-width="1.5" stroke-linecap="round"/>
        <ellipse cx="70" cy="68" rx="38" ry="10" fill="url(#waxTop)"/>
        <rect id="wax-body" x="32" y="68" width="76" height="158" fill="url(#waxGrad)" rx="2"/>
        <rect x="36" y="72" width="10" height="150" fill="white" opacity="0.07" rx="4"/>
        <rect x="32" y="140" width="76" height="50" fill="rgba(63,63,63,0.08)"/>
        <rect x="32" y="140" width="76" height="1" fill="#BFBFBF" opacity="0.3"/>
        <rect x="32" y="190" width="76" height="1" fill="#BFBFBF" opacity="0.3"/>
        <text x="70" y="162" font-family="Georgia,serif" font-size="7" letter-spacing="3" fill="#3F3F3F" text-anchor="middle" opacity="0.7">SCENTORA</text>
        <text x="70" y="175" font-family="Georgia,serif" font-size="4.5" letter-spacing="2" fill="#3F3F3F" text-anchor="middle" opacity="0.5">LA NEUVEVILLE</text>
        <ellipse id="wax-base" cx="70" cy="226" rx="38" ry="8" fill="#C0C0B0"/>
      </svg>
    </button>
    <div class="cps-display"><em id="cps-display">0</em> bougie / sec</div>
    <div class="click-hint">Cliquez pour allumer</div>
  </div>

  <div class="shop-panel">
    <div class="shop-header">
      <div class="panel-section-title" style="margin:0">Atelier</div>
    </div>
    <div class="shop-list" id="shop-list"></div>
    <div class="upgrades-section">
      <div class="panel-section-title" style="margin:0">Améliorations</div>
      <div class="upgrade-grid" id="upgrade-grid"></div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── Paliers de couleur de cire ────────────────────────────────────────
// Score = clics totaux + (bougies/sec × 10)  — récompense autant l'actif que le passif
const WAX_TIERS = [
  { score:0,        colors:['#F5F5F5','#D8D8D0','#B8B8A8'], top:['#EFEFEF','#C8C8BC'], name:null },
  { score:250,      colors:['#FFF3CC','#F5D97A','#C8A832'], top:['#FFF8DC','#E8C540'], name:'🌟 Cire dorée' },
  { score:1000,     colors:['#FFD4D4','#F5898A','#C83232'], top:['#FFE0E0','#E85050'], name:'🌹 Cire cramoisie' },
  { score:4000,     colors:['#D4E8FF','#7AABF5','#2060C8'], top:['#E0EEFF','#5090E8'], name:'💙 Cire saphir' },
  { score:16000,    colors:['#D4FFD4','#7AF58A','#28A832'], top:['#E0FFE0','#50D860'], name:'🌿 Cire émeraude' },
  { score:64000,    colors:['#EDD4FF','#C07AF5','#7828C8'], top:['#F4E0FF','#A850E8'], name:'🔮 Cire améthyste' },
  { score:256000,   colors:['#FFE0D0','#FF8040','#C84010'], top:['#FFF0E0','#FF6020'], name:'🔥 Cire infernale' },
  { score:1024000,  colors:['#D0F0FF','#40C0FF','#0080C0'], top:['#E0F8FF','#20B0FF'], name:'❄️ Cire glaciale' },
  { score:4096000,  colors:['#111111','#333333','#555555'], top:['#222222','#444444'], name:'🖤 Cire obsidienne' },
];

let currentTierIndex = 0;

function waxScore() {
  return g.totalClicks + cps() * 10;
}

function getActiveTier() {
  let active = WAX_TIERS[0];
  for (const tier of WAX_TIERS) {
    if (waxScore() >= tier.score) active = tier;
    else break;
  }
  return active;
}

    document.getElementById('wax-stop-1').setAttribute('stop-color', tier.colors[1]);
    document.getElementById('wax-stop-2').setAttribute('stop-color', tier.colors[2]);

  }, waxRect ? 220 : 0);
}

function fmt(n) {
  if(n>=1e12) return (n/1e12).toFixed(2)+' T';
  if(n>=1e9)  return (n/1e9).toFixed(2)+' G';
  if(n>=1e6)  return (n/1e6).toFixed(2)+' M';
  if(n>=1e3)  return (n/1e3).toFixed(1)+' k';
  return Math.floor(n).toString();
}

function bldCost(b) { return Math.ceil(b.baseCost * Math.pow(1.15, g.owned[b.id])); }
function cps() { return BUILDINGS.reduce((s,b)=>s+b.baseCps*g.owned[b.id]*g.bm[b.id],0); }

function renderStats() {
  document.getElementById('total-count').textContent = fmt(g.cookies);
  document.getElementById('stat-cpc').textContent    = fmt(g.cpc);
  document.getElementById('stat-cps').textContent    = fmt(cps());
  document.getElementById('stat-clicks').textContent = fmt(g.totalClicks);
  document.getElementById('stat-buildings').textContent = Object.values(g.owned).reduce((a,b)=>a+b,0);
  document.getElementById('cps-display').textContent = fmt(cps());

  // Wax tier display
  const tier = getActiveTier();
  const tierIdx = WAX_TIERS.indexOf(tier);
  const tierEl = document.getElementById('stat-wax-tier');
  if (tierEl) {
    tierEl.textContent = tier.name ? tier.name.replace(/^.+? /,'') : 'Naturelle';
    tierEl.style.color = tier.colors[1] || '#F5F5F5';
  }
  // Progress bar toward next tier
  const nextTier = WAX_TIERS[tierIdx + 1];
  const bar = document.getElementById('wax-progress-bar');
  const lbl = document.getElementById('wax-progress-label');
  if (bar && lbl) {
    if (nextTier) {
      const prev = tier.score;
      const score = waxScore();
      const pct = Math.min(100, ((score - prev) / (nextTier.score - prev)) * 100);
      bar.style.width = pct + '%';
      bar.style.background = tier.colors[1] || 'var(--gold)';
      const remaining = Math.max(0, nextTier.score - score);
      lbl.textContent = remaining > 0 ? fmt(remaining) + ' pts restants' : 'Palier atteint !';
    } else {
      bar.style.width = '100%';
      lbl.textContent = 'Palier max atteint ✨';
    }
  }
}

  g.cookies -= cost;
  g.owned[b.id]++;
  toast(b.icon + ' ' + b.name + ' — ajouté à l\'atelier');
  render();

function buyUpgrade(u) {
  if (g.bought.has(u.id)) return;
  if (g.cookies < u.cost) { toast('Pas assez de bougies !'); return; }
  g.cookies -= u.cost;
  g.bought.add(u.id);

  toast('✨ ' + u.name + ' débloquée');
  render();
}

const btn = document.getElementById('candle-btn');
const center = document.getElementById('center-panel');

// ── Fond dynamique canvas ─────────────────────────────────────────────
(function initBgCanvas() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const MAX_PARTICLES = 45;
  const particles = [];

  function resize() {
    canvas.width  = center.offsetWidth;
    canvas.height = center.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return {r,g,b};
  }

  let bgColor = {r:255,g:208,b:122};
  function lerp(a,b,t){ return a+(b-a)*t; }

  // Tier-specific particle behaviors
  // 0=natural 1=gold 2=crimson 3=sapphire 4=emerald 5=amethyst 6=infernal 7=glacial 8=obsidian
  const TIER_MODES = [
    { shape:'circle', drift:'float',  sizeMin:1.5, sizeMax:4,   speedY:-0.5, speedX:0.3, wobble:0.03 },  // natural
    { shape:'star',   drift:'float',  sizeMin:1,   sizeMax:3.5, speedY:-0.6, speedX:0.4, wobble:0.04 },  // gold
    { shape:'circle', drift:'spiral', sizeMin:2,   sizeMax:5,   speedY:-0.4, speedX:0.6, wobble:0.05 },  // crimson
    { shape:'diamond',drift:'float',  sizeMin:1.5, sizeMax:3,   speedY:-0.7, speedX:0.2, wobble:0.02 },  // sapphire
    { shape:'circle', drift:'zigzag', sizeMin:1.5, sizeMax:4,   speedY:-0.5, speedX:0.5, wobble:0.06 },  // emerald
    { shape:'star',   drift:'spiral', sizeMin:1,   sizeMax:3,   speedY:-0.4, speedX:0.3, wobble:0.04 },  // amethyst
    { shape:'triangle',drift:'burst', sizeMin:2,   sizeMax:5,   speedY:-0.8, speedX:0.7, wobble:0.07 },  // infernal
    { shape:'diamond',drift:'snow',   sizeMin:1,   sizeMax:3.5, speedY: 0.3, speedX:0.2, wobble:0.02 },  // glacial
    { shape:'circle', drift:'float',  sizeMin:0.8, sizeMax:2,   speedY:-0.3, speedX:0.15,wobble:0.01 },  // obsidian
  ];

  function spawnParticle() {
    const ti = currentTierIndex;
    const mode = TIER_MODES[ti] || TIER_MODES[0];
    const col = hexToRgb(WAX_TIERS[ti].colors[1] || '#F5D97A');
    const isSnow = mode.drift === 'snow';
    return {
      x: canvas.width * (0.1 + Math.random() * 0.8),
      y: isSnow ? -10 : canvas.height * (0.5 + Math.random() * 0.45),
      vx: (Math.random() - 0.5) * mode.speedX * 2,
      vy: isSnow ? (mode.speedY + Math.random() * 0.4) : -(mode.speedY * 0.5 + Math.random() * mode.speedY),
      radius: mode.sizeMin + Math.random() * (mode.sizeMax - mode.sizeMin),
      alpha: 0,
      maxAlpha: 0.07 + Math.random() * 0.13,
      life: 0,
      maxLife: 100 + Math.random() * 200,
      col,
      shape: mode.shape,
      drift: mode.drift,
      wobble: mode.wobble,
      phase: Math.random() * Math.PI * 2,
    };
  }

  for (let i = 0; i < MAX_PARTICLES; i++) {
    const p = spawnParticle();
    p.life = Math.random() * p.maxLife;
    particles.push(p);
  }

  function drawShape(ctx, shape, x, y, r) {
    ctx.beginPath();
    if (shape === 'circle') {
      ctx.arc(x, y, r, 0, Math.PI * 2);
    } else if (shape === 'star') {
      for (let i = 0; i < 5; i++) {
        const a1 = (i * 2 * Math.PI / 5) - Math.PI / 2;
        const a2 = a1 + Math.PI / 5;
        if (i === 0) ctx.moveTo(x + Math.cos(a1)*r, y + Math.sin(a1)*r);
        else ctx.lineTo(x + Math.cos(a1)*r, y + Math.sin(a1)*r);
        ctx.lineTo(x + Math.cos(a2)*r*0.4, y + Math.sin(a2)*r*0.4);
      }
      ctx.closePath();
    } else if (shape === 'diamond') {
      ctx.moveTo(x, y - r);
      ctx.lineTo(x + r * 0.6, y);
      ctx.lineTo(x, y + r);
      ctx.lineTo(x - r * 0.6, y);
      ctx.closePath();
    } else if (shape === 'triangle') {
      ctx.moveTo(x, y - r);
      ctx.lineTo(x + r * 0.87, y + r * 0.5);
      ctx.lineTo(x - r * 0.87, y + r * 0.5);
      ctx.closePath();
    } else {
      ctx.arc(x, y, r, 0, Math.PI * 2);
    }
  }

  function drawBg() {
    const w = canvas.width, h = canvas.height;
    const ti = currentTierIndex;
    const tierCol = hexToRgb(WAX_TIERS[ti].colors[1] || '#D8D8D0');
    bgColor.r = lerp(bgColor.r, tierCol.r, 0.012);
    bgColor.g = lerp(bgColor.g, tierCol.g, 0.012);
    bgColor.b = lerp(bgColor.b, tierCol.b, 0.012);

    ctx.clearRect(0, 0, w, h);

    // Radial glow from center — intensity varies by tier
    const cx = w / 2, cy = h * 0.46;
    const glowRadius = Math.min(w, h) * (0.5 + ti * 0.04);
    const glowAlpha1 = 0.07 + ti * 0.01;
    const glowAlpha2 = 0.03 + ti * 0.005;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowRadius);
    grad.addColorStop(0,    `rgba(${Math.round(bgColor.r)},${Math.round(bgColor.g)},${Math.round(bgColor.b)},${glowAlpha1})`);
    grad.addColorStop(0.4,  `rgba(${Math.round(bgColor.r)},${Math.round(bgColor.g)},${Math.round(bgColor.b)},${glowAlpha2})`);
    grad.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Tier 6 (infernal): extra hot bottom glow
    if (ti === 6) {
      const heatGrad = ctx.createLinearGradient(0, h * 0.7, 0, h);
      heatGrad.addColorStop(0, 'rgba(200,40,0,0)');
      heatGrad.addColorStop(1, 'rgba(200,40,0,0.08)');
      ctx.fillStyle = heatGrad;
      ctx.fillRect(0, 0, w, h);
    }
    // Tier 7 (glacial): cool top glow
    if (ti === 7) {
      const iceGrad = ctx.createLinearGradient(0, 0, 0, h * 0.4);
      iceGrad.addColorStop(0, 'rgba(100,200,255,0.06)');
      iceGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = iceGrad;
      ctx.fillRect(0, 0, w, h);
    }
    // Tier 8 (obsidian): dim vignette everywhere
    if (ti === 8) {
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(0, 0, w, h);
    }

    // Vignette bottom
    const vign = ctx.createLinearGradient(0, h * 0.6, 0, h);
    vign.addColorStop(0, 'rgba(0,0,0,0)');
    vign.addColorStop(1, 'rgba(0,0,0,0.2)');
    ctx.fillStyle = vign;
    ctx.fillRect(0, 0, w, h);

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life++;

      // Drift modes
      if (p.drift === 'float') {
        p.x += p.vx + Math.sin(p.life * p.wobble + p.phase) * 0.4;
        p.y += p.vy;
      } else if (p.drift === 'spiral') {
        p.x += p.vx + Math.cos(p.life * p.wobble + p.phase) * 0.8;
        p.y += p.vy + Math.sin(p.life * p.wobble * 0.5) * 0.3;
      } else if (p.drift === 'zigzag') {
        p.x += p.vx + Math.sin(p.life * p.wobble * 2 + p.phase) * 1.2;
        p.y += p.vy;
      } else if (p.drift === 'burst') {
        p.x += p.vx * (1 + p.life * 0.002);
        p.y += p.vy;
        p.vy += 0.008;
      } else if (p.drift === 'snow') {
        p.x += p.vx + Math.sin(p.life * p.wobble + p.phase) * 0.5;
        p.y += p.vy;
      }

      const progress = p.life / p.maxLife;
      p.alpha = progress < 0.15 ? (progress / 0.15) * p.maxAlpha
              : progress > 0.7  ? ((1 - progress) / 0.3) * p.maxAlpha
              : p.maxAlpha;

      // Color follow tier
      const tc = hexToRgb(WAX_TIERS[currentTierIndex].colors[1] || '#F5D97A');
      p.col.r = lerp(p.col.r, tc.r, 0.025);
      p.col.g = lerp(p.col.g, tc.g, 0.025);
      p.col.b = lerp(p.col.b, tc.b, 0.025);

      ctx.fillStyle = `rgba(${Math.round(p.col.r)},${Math.round(p.col.g)},${Math.round(p.col.b)},${p.alpha})`;
      drawShape(ctx, p.shape, p.x, p.y, p.radius);
      ctx.fill();

      if (p.life >= p.maxLife || p.y < -20 || p.y > h + 20) {
        particles[i] = spawnParticle();
      }
    }

    // Étincelles de clic
    for (let i = window._sparks ? window._sparks.length - 1 : -1; i >= 0; i--) {
      const s = window._sparks[i];
      s.life++;
      s.x += s.vx;
      s.y += s.vy;
      s.vy += 0.12;
      s.vx *= 0.97;
      const t = s.life / s.maxLife;
      const alpha = (1 - t) * 0.9;
      const col = hexToRgb(s.col);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.radius * (1 - t * 0.5), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${col.r},${col.g},${col.b},${alpha})`;
      ctx.fill();
      if (s.life >= s.maxLife) window._sparks.splice(i, 1);
    }

    requestAnimationFrame(drawBg);
  }
  drawBg();
})();
// ─────────────────────────────────────────────────────────────────────

// ── Burst d'étincelles canvas au clic ────────────────────────────────
window._sparks = [];
function burstSparks(cx, cy) {
  const tier = WAX_TIERS[currentTierIndex];
  const col = tier.colors[1] || '#FFD07A';
  const count = 10 + Math.floor(Math.random() * 8);

    const speed = 1.5 + Math.random() * 3.5;
    window._sparks.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      life: 0,
      maxLife: 28 + Math.random() * 22,
      radius: 1.2 + Math.random() * 2.2,
      col,
    });
  }
}
window._sparkBurst = burstSparks;

  f.className = 'float-text' + (g.cpc >= 10 ? ' big' : '');
  f.textContent = '+' + fmt(g.cpc);
  const tier = WAX_TIERS[currentTierIndex];
  f.style.color = tier.colors[1] || 'var(--gold)';
  f.style.left = (bx - 30 + (Math.random() * 30 - 15)) + 'px';
  f.style.top  = (by - 140 + (Math.random() * 20 - 10)) + 'px';
  center.appendChild(f);
  f.addEventListener('animationend', () => f.remove());

  // ② 1–2 textes secondaires plus petits autour
  const extras = Math.random() < 0.5 ? 1 : 2;
  for (let i = 0; i < extras; i++) {
    const f2 = document.createElement('div');
    f2.className = 'float-text';
    f2.style.fontSize = '1.1rem';
    f2.style.opacity = '0.6';
    f2.style.color = tier.colors[0] || 'var(--gold)';
    f2.textContent = '+' + fmt(g.cpc);
    f2.style.left = (bx + (Math.random() * 80 - 40)) + 'px';
    f2.style.top  = (by - 100 + (Math.random() * 40 - 20)) + 'px';
    f2.style.animationDuration = (0.8 + Math.random() * 0.5) + 's';
    center.appendChild(f2);
    f2.addEventListener('animationend', () => f2.remove());
  }

  // ③ Flash de lumière
  const flash = document.createElement('div');
  flash.className = 'click-flash';
  const fs = 120 + Math.random() * 60;
  flash.style.cssText = `width:${fs}px;height:${fs}px;left:${bx - fs/2}px;top:${by - fs/2}px;background:radial-gradient(circle, ${tier.colors[0]}cc 0%, ${tier.colors[1]}44 50%, transparent 70%);`;
  center.appendChild(flash);
  flash.addEventListener('animationend', () => flash.remove());

  // ④ Ripple
  const ripple = document.createElement('div');
  ripple.className = 'click-ripple';
  const rs = 80;
  ripple.style.cssText = `width:${rs}px;height:${rs}px;left:${bx - rs/2}px;top:${by - rs/2}px;border-color:${tier.colors[1]}99;`;
  center.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());

  // ⑤ Étincelles canvas
  if (window._sparkBurst) {
    const canvas = document.getElementById('bg-canvas');
    if (canvas) {
      const cr = canvas.getBoundingClientRect();
      window._sparkBurst(e.clientX - cr.left, e.clientY - cr.top);
    }
  }

  renderStats(); renderShop(); renderUpgrades();
});

let tickCount = 0;
setInterval(() => {
  const v = cps();
  if (v > 0) {
    const gained = v / 20;
    g.cookies += gained;
    g.totalCookies += gained;
  }
  tickCount++;
  updateWaxColor();
  renderStats();
  // Rebuild shop/upgrades only every 10 ticks (500ms) to avoid DOM thrashing
  if (tickCount % 10 === 0) {
    renderShop();
    renderUpgrades();
  }
}, 50);

let toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2400);
}

render();
</script>
</body>
</html>
